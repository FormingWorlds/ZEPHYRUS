name: ZEPHYRUS Nightly Full Suite

on:
  schedule:
    # 03:00 UTC daily.
    - cron: '0 3 * * *'
  workflow_dispatch:

# Nightly full suite: every tier (unit + smoke + integration + slow),
# including the real MORS-coupled escape that downloads stellar-evolution
# tracks into FWL_DATA. Coverage is measured here across the whole suite,
# enforced against the 90% full gate, and uploaded to Codecov.

permissions:
  contents: read

jobs:
  full-suite:
    name: ZEPHYRUS-nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[develop]"

      - uses: actions/cache@v5
        id: cache-fwl-data
        with:
          path: ${{ github.workspace }}/fwl_data
          key: fwl-data-nightly-1

      - name: Run full suite with coverage
        env:
          FWL_DATA: ${{ github.workspace }}/fwl_data
        run: |
          FULL_FAIL_UNDER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['coverage']['report']['fail_under'])")
          echo "Full gate fail_under: ${FULL_FAIL_UNDER}%"
          pytest -m "(unit or smoke or integration or slow) and not skip" \
            --cov=zephyrus \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${FULL_FAIL_UNDER}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: FormingWorlds/ZEPHYRUS
          files: ./coverage.xml
          flags: nightly
          fail_ci_if_error: false
